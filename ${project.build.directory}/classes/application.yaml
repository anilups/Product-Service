# ========================================
# APPLICATION CONFIGURATION
# ========================================
spring:
  application:
    name: inventory-service

  # ========================================
  # COUCHBASE CONFIGURATION
  # ========================================
  couchbase:
    connection-string: couchbase://localhost
    username: Administrator
    password: password
    bucket-name: inventory_bucket

  # ========================================
  # JACKSON CONFIGURATION
  # ========================================
  jackson:
    serialization:
     write-dates-as-timestamps: false
    time-zone: UTC
    default-property-inclusion: non_null

  # ========================================
  # DEVTOOLS (Development Only)
  # ========================================
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

# ========================================
# SERVER CONFIGURATION
# ========================================
server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# ========================================
# JWT CONFIGURATION
# ========================================
jwt:
  secret: mySecretKey123456789012345678901234567890
  expiration: 86400000  # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

# ========================================
# LOGGING CONFIGURATION
# ========================================
logging:
  level:
    root: INFO
    com.example.inventory: DEBUG
    com.example.auth: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    com.couchbase: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/inventory-service.log
    max-size: 10MB
    max-history: 30

# ========================================
# ACTUATOR ENDPOINTS
# ========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    couchbase:
      enabled: true

# ========================================
# SPRINGDOC / SWAGGER CONFIGURATION
# ========================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: true

# ========================================
# APPLICATION SPECIFIC SETTINGS
# ========================================
inventory:
  # Stock alert settings
  alerts:
    enabled: true
    check-interval: 3600000  # 1 hour in milliseconds
    notification:
      email:
        enabled: false
        recipients: admin@example.com
      sms:
        enabled: false

  # Stock movement settings
  stock:
    allow-negative: false
    track-history: true
    history-retention-days: 365

  # Scheduler settings
  scheduler:
    stock-alert-check: "0 0 * * * *"  # Every hour
    reorder-report: "0 0 9 * * *"     # Daily at 9 AM
    cleanup-old-movements: "0 0 2 * * *"  # Daily at 2 AM

---
# ========================================
# DEVELOPMENT PROFILE
# ========================================
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    root: DEBUG
    com.example: DEBUG
    org.springframework.web: DEBUG

jwt:
  secret: dev-secret-key-for-development-only-123456

inventory:
  alerts:
    notification:
      email:
        enabled: false

---
# ========================================
# PRODUCTION PROFILE
# ========================================
spring:
  config:
    activate:
      on-profile: prod

  couchbase:
    connection-string: ${COUCHBASE_CONNECTION_STRING}
    username: ${COUCHBASE_USERNAME}
    password: ${COUCHBASE_PASSWORD}
    bucket-name: ${COUCHBASE_BUCKET_NAME}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-stacktrace: never
    include-exception: false

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    root: WARN
    com.example: INFO

inventory:
  alerts:
    notification:
      email:
        enabled: true
        recipients: ${ALERT_EMAIL_RECIPIENTS}

---
# ========================================
# TEST PROFILE
# ========================================
spring:
  config:
    activate:
      on-profile: test

  couchbase:
    connection-string: couchbase://localhost
    username: testuser
    password: testpass
    bucket-name: test_bucket

jwt:
  secret: test-secret-key-123456789012345678901234567890
  expiration: 3600000  # 1 hour for tests

logging:
  level:
    root: ERROR
    com.example: DEBUG